<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Newsletter Signup — Sliquid</title>
</head>
<body style="margin:0;padding:0;background-color:#f0f4f8;font-family:Inter,Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f0f4f8;">
    <tr>
      <td align="center" style="padding:40px 16px;">
        <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;width:100%;">

          <!-- HEADER -->
          <tr>
            <td style="background-color:#fefaf4;border-radius:8px 8px 0 0;border-bottom:1px solid #ddc9ae;padding:24px 40px;text-align:center;">
              <img src="https://sliquid-ai-creator.s3.us-east-2.amazonaws.com/reference-images/58439771-8fd8-454f-81eb-e2e5123dede5.png" alt="Sliquid" style="max-width:180px;height:auto;display:block;margin:0 auto;" />
              <p style="margin:10px 0 0;font-size:22px;font-weight:700;color:#0A84C0;letter-spacing:2px;">SLIQUID</p>
              <p style="margin:4px 0 0;font-size:11px;color:#a08060;letter-spacing:3px;text-transform:uppercase;">Newsletter Signup</p>
            </td>
          </tr>

          <!-- BODY -->
          <tr>
            <td style="background-color:#ffffff;border-left:1px solid #e2e8f0;border-right:1px solid #e2e8f0;padding:40px 40px 32px;">

              <p style="margin:0 0 8px;font-size:20px;font-weight:700;color:#1a202c;">New newsletter subscriber</p>
              <p style="margin:0 0 24px;font-size:14px;color:#4a5568;line-height:1.6;">
                Someone signed up for the Sliquid B2B newsletter:
              </p>

              <table cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#f0f8ff;border:1px solid #bee3f8;border-radius:8px;margin-bottom:24px;">
                <tr>
                  <td style="padding:18px 24px;">
                    <p style="margin:0 0 4px;font-size:12px;font-weight:600;color:#718096;text-transform:uppercase;letter-spacing:0.5px;">Email Address</p>
                    <p style="margin:0;font-size:16px;font-weight:600;color:#0A84C0;">{{subscriber_email}}</p>
                  </td>
                </tr>
              </table>

              <p style="margin:0;font-size:13px;color:#718096;line-height:1.6;">
                Add this address to your newsletter list or CRM as appropriate.
              </p>

            </td>
          </tr>

          <!-- FOOTER -->
          <tr>
            <td style="background-color:#f7fafc;border:1px solid #e2e8f0;border-radius:0 0 8px 8px;padding:20px 40px;text-align:center;">
              <p style="margin:0;font-size:12px;color:#a0aec0;">Submitted via sliquid.com newsletter signup</p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
